//06

let fila = [];
let atendidos = [];

function entrarFila(nome) {
    let entrada = {
        nome: nome,
        horaEntrada: Date.now()
    };

    fila.push(entrada);
    console.log("Fila:", fila);
}

function atender() {
    if (fila.length === 0) {
        console.log("Fila vazia");
        return;
    }

    let pessoa = fila.shift();
    let horaSaida = Date.now();
    let tempo = (horaSaida - pessoa.horaEntrada) / 1000;

    let registro = {
        nome: pessoa.nome,
        entrada: new Date(pessoa.horaEntrada).toLocaleString(),
        saida: new Date(horaSaida).toLocaleString(),
        tempoSegundos: tempo
    };

    atendidos.push(registro);

    console.log("Fila:", fila);
    console.log("Atendidos:", atendidos);
}


entrarFila("João");
entrarFila("Maria");
setTimeout(() => atender(), 2000);
